############### Config options ##################

[gcode_macro bedfanvars]
variable_threshold: 90	  # If bed temp target is above this threshold, fans will be enabled. If temp is set to below this threshold, fans will be disabled.
variable_fast_start: 0.3  # start of fast bedfans
variable_fast_step: 0.1   #steps per ramping up the fans to let the bed heater keep up
#variable_fast_delay: 15   # delay in seconds between each ramp up step. 
variable_fast: 0.8		  # Fan speed once bed temp is reached
variable_medium: 0.35     # Fan Speed for Bedfan once bed temp is reached
variable_slow: 0.2		  # Fan speed while bed is heating
variable_current_fast: 0.0 # Keep at 0 to use fast_start value, if this is set with greater value than 0 it will start with that value + the fast_step value. i.e 0.4 (current_fast) + 0.2 (fast_step) = sets the Bedfans to 0.6 when Bed target temp is reached.
gcode:

########## Bed Fans #########

[fan_generic BedFan]
pin: PF9
#cycle_time: 0.05
kick_start_time: 0.5

#[fan_generic NeverMore]
#pin: PA4
#cycle_time: 0.05
#kick_start_time: 0.5

########## Aliases #########

[gcode_macro BedFansSlow]
gcode:
	# Vars
	{% set SLOW = printer["gcode_macro bedfanvars"].slow|float %}
	
	SET_FAN_SPEED FAN=BedFan SPEED={SLOW}
    #SET_FAN_SPEED FAN=NeverMore SPEED={SLOW}

[gcode_macro BedFansMedium]
gcode:
	# Vars
	{% set MEDIUM = printer["gcode_macro bedfanvars"].medium|float %}
	
	SET_FAN_SPEED FAN=BedFan SPEED={MEDIUM}

#[gcode_macro BedFansApplyRamp]
#gcode:
    #{% set FAST = printer["gcode_macro bedfanvars"].current_fast|float %}
    #SET_FAN_SPEED FAN=BedFan SPEED={FAST}
    #SET_FAN_SPEED FAN=NeverMore SPEED={FAST} (place holder for nevermore fan filter)

[gcode_macro BedFansOff]
gcode:
	SET_FAN_SPEED FAN=BedFan SPEED=0
    #SET_FAN_SPEED FAN=NeverMore SPEED=0 (place holder for nevermore fan filter)

############ Command overrides ############

# Override, set fan speeds to low and start monitoring loop.
[gcode_macro SET_HEATER_TEMPERATURE]
rename_existing: _SET_HEATER_TEMPERATURE
gcode:
	# Parameters
	{% set HEATER = params.HEATER|default("None") %}
	{% set TARGET = params.TARGET|default(0)|int %}
	# Vars
	{% set THRESHOLD = printer["gcode_macro bedfanvars"].threshold|int %}
	
	{% if HEATER|lower == "extruder" %}
		M104 S{TARGET}
	{% elif HEATER|lower == "heater_bed" %}
		M99140 S{TARGET}
	{% else %}
		{action_respond_info("Heater %s not supported" % HEATER)}
	{% endif %}

	# Set fans to low if heater_bed temp is requested above threshold temp, and kick off monitoring loop.
	{% if HEATER|lower == "heater_bed" %}
		{% if TARGET >= THRESHOLD %}
			BedFansSlow
            #MFNanoSlow
			UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=1
            #UPDATE_DELAYED_GCODE ID=mfnanoloop DURATION=1 
		{% else %}
			BedFansOff
            #MFNanoOff
			UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=0 #	Cancel bed fan loop if it's running
            #UPDATE_DELAYED_GCODE ID=mfnanoloop DURATION=1
		{% endif %}
	{% endif %}
	
# Override M190 (Wait for Bed Temperature)
# As a bonus, use TEMPERATURE_WAIT so we don't have to wait for PID to level off.
[gcode_macro M190]
rename_existing: M99190
gcode:
	# Parameters
	{% set S = params.S|int %}
	# Vars
	{% set THRESHOLD = printer["gcode_macro bedfanvars"].threshold|int %}
	
	{% if S >= THRESHOLD %}
		BedFansSlow																# >= Threshold temp: Low speed fans while heating 
        #MFNanoSlow
	{% else %}
		BedFansOff																# < Threshold temp: Turn bed fans off
        #MFNanoOff
	{% endif %}                                        

	M140 {% for p in params
	  %}{'%s%s' % (p, params[p])}{%
	  endfor %}																	# Set bed temp
	  
	{% if S != 0 %}
		TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={S|int} MAXIMUM={S|int + 5}	# Wait for bed temp within 5 degrees
	{% endif %}

	# Post-heating fan speeds
	#{% if S >= THRESHOLD %}								    
		#BedFansFast																# >= Threshold temp: Higher speed fans after heating finished
        #MFNanoFast
        #BedFansMedium
	#{% endif %}
	
# Replace M140 (Set Bed Temperature) to just be an alias of SET_HEATER_TEMPERATURE (which has associated bed fan logic if enabled)
[gcode_macro M140]
rename_existing: M99140
gcode:
	# Parameters
	{% set S = params.S|float %}
	
	SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={S}
	
# Replace TURN_OFF_HEATERS
[gcode_macro TURN_OFF_HEATERS]
rename_existing: _TURN_OFF_HEATERS
gcode:
	BedFansOff
	_TURN_OFF_HEATERS
	
################ Monitoring loop #####################

# Turns bed fans to "fast" speed once target bed temp is reached.
[delayed_gcode bedfanloop]
gcode:
    # Vars
    {% set THRESHOLD = printer["gcode_macro bedfanvars"].threshold|int %}
    {% set CHAMBER_TEMP = printer["temperature_sensor chamber"].temperature|float %}
    {% set BED_TEMP = printer.heater_bed.temperature|float %}
    {% set BED_TARGET = printer.heater_bed.target|float %}

    {% set FAST_MAX = printer["gcode_macro bedfanvars"].fast|float %}
    {% set FAST_START = printer["gcode_macro bedfanvars"].fast_start|float %}
    {% set FAST_STEP = printer["gcode_macro bedfanvars"].fast_step|float %}
    {% set CURRENT_FAST = printer["gcode_macro bedfanvars"].current_fast|float %}

    {% if BED_TARGET >= THRESHOLD %}

        {% if BED_TEMP >= (BED_TARGET - 1) %}

            {% if CHAMBER_TEMP > 65 %}
                BedFansSlow

            {% elif CHAMBER_TEMP >= 60 and CHAMBER_TEMP <= 65 %}
                BedFansMedium

            {% else %}
                {% if CURRENT_FAST < FAST_START %}
                    {% set NEW_FAST = FAST_START %}
                {% else %}
                    {% set NEW_FAST = CURRENT_FAST + FAST_STEP %}
                {% endif %}

                {% if NEW_FAST > FAST_MAX %}
                    {% set NEW_FAST = FAST_MAX %}
                {% endif %}

                SET_GCODE_VARIABLE MACRO=bedfanvars VARIABLE=current_fast VALUE={NEW_FAST}
                SET_FAN_SPEED FAN=BedFan SPEED={NEW_FAST}
            {% endif %}

        {% else %}
            BedFansSlow
            SET_GCODE_VARIABLE MACRO=bedfanvars VARIABLE=current_fast VALUE=0.0
        {% endif %}

        UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=5

    {% else %}
        BedFansOff
        SET_GCODE_VARIABLE MACRO=bedfanvars VARIABLE=current_fast VALUE=0.0
        UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=0
    {% endif %}