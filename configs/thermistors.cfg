#####################################################################
#   TH
# #####################################################################
[temperature_sensor chamber_Toolhead]
## Chamber Temperature - T1
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: nhk:gpio28
min_temp: 0
max_temp: 100
gcode_id: chamber_th

[thermistor CMFB103F3950FANT]
temperature1: 0.0
resistance1: 32116.0
temperature2: 40.0
resistance2: 5309.0
temperature3: 80.0
resistance3: 1228.0

[temperature_sensor nh_temp]
## Nitehawk PCB Sensor
sensor_type: CMFB103F3950FANT
sensor_pin: nhk:gpio26
pullup_resistor: 2200
min_temp: 0
max_temp: 100
gcode_id: nh_th

#[temperature_sensor raspberry_pi]
#sensor_type: temperature_host

[temperature_sensor Leviathan]
sensor_type: temperature_mcu

[temperature_sensor chamber_low]
sensor_type: Generic 3950
sensor_pin: PA0
pullup_resistor: 2200

[temperature_sensor chamber_mid]
sensor_type: Generic 3950
sensor_pin: PA3
pullup_resistor: 2200

[temperature_sensor chamber]
sensor_type: temperature_combined
sensor_list: temperature_sensor chamber_Toolhead, temperature_sensor chamber_low, temperature_sensor chamber_mid
combination_method: mean
maximum_deviation:999