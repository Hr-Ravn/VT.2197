[gcode_macro nozzle_scrub]
gcode:
  {% set th = printer.toolhead %}
  {% set z_safe = [th.position.z + 20, th.axis_maximum.z]|min %}
  STATUS_CLEANING
  G1 Z{z_safe} F10000
  G1 Y300 F10000
  G1 X85 F18000
  G1 X35 F18000
  G1 X85 F18000
  G1 X35 F18000
  G1 X85 F18000
  G1 X35 F18000
  G1 X85 F18000
  G1 X35 F18000
  G1 X150 F18000
  G1 Z{z_safe} F10000